<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YTDLP Client</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main id="loginView" class="login-shell" hidden>
      <section class="login-panel">
        <div class="brand-mark">YT</div>
        <h1>YTDLP Client</h1>
        <form id="loginForm" class="stack">
          <label>
            Username
            <input name="username" autocomplete="username" required />
          </label>
          <label>
            Password
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="primary" type="submit">Sign in</button>
          <p id="loginError" class="error" role="alert"></p>
        </form>
      </section>
    </main>

    <main id="appView" class="app-shell" hidden>
      <header class="topbar">
        <div>
          <div class="eyebrow">Self-hosted</div>
          <h1>YTDLP Client</h1>
        </div>
        <div class="session-box">
          <span id="currentUser"></span>
          <button id="logoutButton" class="ghost" type="button">Sign out</button>
        </div>
      </header>

      <section class="workspace">
        <aside class="panel submit-panel">
          <h2>New Download</h2>
          <form id="downloadForm" class="stack">
            <label>
              URL
              <input name="url" type="url" placeholder="https://..." required />
            </label>
            <label>
              Type
              <select id="mediaType" name="media_type">
                <option value="auto">Auto</option>
                <option value="video">Video</option>
                <option value="audio">Audio</option>
                <option value="captions">Captions</option>
                <option value="thumbnail">Thumbnail</option>
              </select>
            </label>
            <details class="settings-popover">
              <summary>Options</summary>
              <div class="settings-grid">
                <label data-setting-group="video">
                  Video Format
                  <select name="video_format">
                    <option value="auto">Auto</option>
                    <option value="mp4">MP4</option>
                    <option value="webm">WebM</option>
                    <option value="mkv">MKV</option>
                  </select>
                </label>
                <label data-setting-group="video">
                  Video Codec
                  <select name="video_codec">
                    <option value="auto">Auto</option>
                    <option value="h264">H.264</option>
                    <option value="h265">H.265</option>
                    <option value="av1">AV1</option>
                    <option value="vp9">VP9</option>
                  </select>
                </label>
                <label data-setting-group="video">
                  Resolution
                  <select name="video_quality">
                    <option value="auto">Auto</option>
                    <option value="2160">2160p</option>
                    <option value="1440">1440p</option>
                    <option value="1080">1080p</option>
                    <option value="720">720p</option>
                    <option value="480">480p</option>
                    <option value="360">360p</option>
                  </select>
                </label>
                <label data-setting-group="audio">
                  Audio Format
                  <select name="audio_format">
                    <option value="auto">Auto</option>
                    <option value="mp3">MP3</option>
                    <option value="m4a">M4A</option>
                    <option value="opus">Opus</option>
                    <option value="flac">FLAC</option>
                    <option value="wav">WAV</option>
                  </select>
                </label>
                <label data-setting-group="audio">
                  Bitrate
                  <select name="audio_bitrate">
                    <option value="auto">Auto</option>
                    <option value="320K">320K</option>
                    <option value="256K">256K</option>
                    <option value="192K">192K</option>
                    <option value="128K">128K</option>
                    <option value="96K">96K</option>
                  </select>
                </label>
                <label data-setting-group="captions">
                  Caption Format
                  <select name="caption_format">
                    <option value="auto">Auto</option>
                    <option value="srt">SRT</option>
                    <option value="vtt">VTT</option>
                    <option value="txt">TXT</option>
                  </select>
                </label>
                <label data-setting-group="captions">
                  Languages
                  <input name="caption_langs" value="de,en" placeholder="de,en" />
                </label>
                <label data-setting-group="thumbnail">
                  Thumbnail Format
                  <select name="thumbnail_format">
                    <option value="auto">Auto</option>
                    <option value="jpg">JPG</option>
                    <option value="png">PNG</option>
                    <option value="webp">WebP</option>
                  </select>
                </label>
              </div>
            </details>
            <label class="checkbox-row">
              <input name="playlist" type="checkbox" />
              Allow playlist
            </label>
            <button class="primary" type="submit">Add to Queue</button>
            <p id="downloadError" class="error" role="alert"></p>
          </form>
        </aside>

        <section class="panel queue-panel">
          <div class="section-head">
            <h2>Queue</h2>
            <button id="refreshButton" class="ghost" type="button">Refresh</button>
          </div>
          <div id="downloadList" class="download-list"></div>
        </section>

        <section id="adminPanel" class="panel admin-panel" hidden>
          <h2>Users</h2>
          <form id="userForm" class="stack compact-form">
            <input name="username" placeholder="Username" required minlength="3" />
            <input name="password" type="password" placeholder="Password" required minlength="10" />
            <label class="checkbox-row">
              <input name="is_admin" type="checkbox" />
              Admin
            </label>
            <button class="primary" type="submit">Create</button>
            <p id="userError" class="error" role="alert"></p>
          </form>
          <div id="userList" class="user-list"></div>
        </section>
      </section>
    </main>

    <footer class="system-footer">
      <span data-version>Loading system information</span>
    </footer>

    <script src="/static/app.js?v=20260620-8"></script>
  </body>
</html>
